    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; scroll-behavior: smooth; }
        body {
            font-family: 'Impact', 'Arial Black', system-ui, -apple-system, sans-serif;
            background: #000;
            color: #fff;
            line-height: 1.4;
            max-width: none;
            overflow-x: hidden;
            padding: 0;
        }
        img, svg { max-width: 100%; display: block; }
        a { color: inherit; text-decoration: none; }
        ul { list-style: none; }

        /* ===== SPACE TOKENS ===== */
        :root {
            --gap: 48px;
            --pad: 72px;
            --section-gap: 120px;
            --primary: #000;
            --secondary: #fff;
            --accent: #ff3b00;
            --border-w: 4px;
            --font-impact: 'Impact', 'Arial Black', system-ui, sans-serif;
            --font-sys: system-ui, -apple-system, sans-serif;
        }

        /* ===== TYPOGRAPHY ===== */
        h1, h2, h3, h4 {
            font-family: var(--font-impact);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.01em;
        }
        h1 { font-size: clamp(3.2rem, 12vw, 6rem); line-height: 0.95; margin-bottom: 0.3em; }
        h2 { font-size: clamp(2.4rem, 8vw, 4rem); line-height: 1; margin-bottom: 0.4em; }
        h3 { font-size: clamp(1.6rem, 5vw, 2.8rem); margin-bottom: 0.5em; }
        p, li {
            font-family: var(--font-sys);
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 1em;
        }
        .small { font-size: 0.85rem; }

        /* ===== LAYOUT ===== */
        .container {
            padding: 0 var(--pad);
        }
        section {
            padding: var(--section-gap) 0;
            position: relative;
        }
        .section-inner {
            padding: 0 var(--pad);
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== BORDERS & RAW TEXTURES ===== */
        .brutal-border {
            border: var(--border-w) solid var(--accent);
        }
        .brutal-border-white {
            border: var(--border-w) solid var(--secondary);
        }

        /* ===== HEADER / NAV ===== */
        header {
            position: relative;
            z-index: 100;
            padding: 24px var(--pad);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--primary);
            border-bottom: var(--border-w) solid var(--accent);
        }
        .logo {
            font-family: var(--font-impact);
            font-size: 2rem;
            color: var(--accent);
            letter-spacing: -0.02em;
            line-height: 1;
        }
        .logo span { color: var(--secondary); font-size: 1.2rem; }

        nav { display: flex; align-items: center; gap: var(--gap); }
        nav a {
            font-family: var(--font-sys);
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--secondary);
            padding: 8px 16px;
            border: 2px solid transparent;
            transition: 0.15s ease;
        }
        nav a:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .nav-cta {
            background: var(--accent);
            color: var(--primary) !important;
            padding: 12px 28px;
            border: none;
            font-weight: 900;
        }
        .nav-cta:hover {
            background: var(--secondary);
            color: var(--primary) !important;
            border-color: var(--secondary);
        }

        /* HAMBURGER — PURE CSS VIA :target + checkbox trick */
        .hamburger-check { display: none; }
        .hamburger-label {
            display: none;
            cursor: pointer;
            padding: 8px;
            z-index: 200;
            user-select: none;
        }
        .hamburger-label span {
            display: block;
            width: 32px;
            height: 4px;
            background: var(--secondary);
            margin: 6px 0;
            transition: 0.2s;
        }
        .nav-mobile-overlay { display: none; }

        @media (max-width: 768px) {
            header { padding: 16px 24px; }
            .hamburger-label { display: block; }
            nav {
                display: none;
                flex-direction: column;
                position: fixed;
                top: 0; left: 0; width: 100%; height: 100vh;
                background: var(--primary);
                padding: 120px 40px 40px;
                gap: 24px;
                justify-content: flex-start;
                align-items: flex-start;
                z-index: 150;
                border: none;
            }
            nav a { font-size: 1.8rem; border: none; padding: 12px 0; }
            .nav-cta { background: transparent; color: var(--accent) !important; padding: 12px 0; font-size: 1.8rem; }
            #hamburger-toggle:checked ~ nav {
                display: flex;
            }
            #hamburger-toggle:checked ~ .hamburger-label span:nth-child(1) {
                transform: rotate(45deg) translate(6px, 6px);
            }
            #hamburger-toggle:checked ~ .hamburger-label span:nth-child(2) {
                opacity: 0;
            }
            #hamburger-toggle:checked ~ .hamburger-label span:nth-child(3) {
                transform: rotate(-45deg) translate(6px, -6px);
            }
            .container { padding: 0 24px; }
            .section-inner { padding: 0 24px; }
            section { padding: var(--section-gap) 0; }
        }

        /* ===== HERO ===== */
        .hero {
            padding: 60px 0 100px;
            position: relative;
            overflow: hidden;
            background: var(--primary);
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -40px; right: -80px;
            width: 500px; height: 500px;
            background: repeating-linear-gradient(
                45deg,
                var(--accent) 0px, var(--accent) 8px,
                transparent 8px, transparent 16px
            );
            opacity: 0.3;
            transform: rotate(12deg) skew(5deg);
            pointer-events: none;
        }
        .hero .section-inner {
            display: flex;
            flex-wrap: wrap;
            gap: var(--gap);
            align-items: center;
            position: relative;
            z-index: 2;
        }
        .hero-text { flex: 2; min-width: 300px; }
        .hero-visual { flex: 1; min-width: 260px; text-align: center; }
        .hero h1 {
            font-size: clamp(3.6rem, 14vw, 7rem);
            line-height: 0.9;
            color: var(--secondary);
            text-shadow: 6px 6px 0 var(--accent);
            margin-bottom: 24px;
        }
        .hero h1 .accent { color: var(--accent); text-shadow: none; }
        .hero p {
            font-size: 1.3rem;
            max-width: 700px;
            border-left: 6px solid var(--accent);
            padding-left: 24px;
            margin-bottom: 32px;
        }
        .hero .btn-group { display: flex; gap: 24px; flex-wrap: wrap; }
        .btn {
            display: inline-block;
            padding: 18px 44px;
            font-family: var(--font-impact);
            font-size: 1.4rem;
            text-transform: uppercase;
            border: var(--border-w) solid var(--accent);
            background: var(--primary);
            color: var(--secondary);
            transition: 0.1s linear;
        }
        .btn:hover {
            background: var(--accent);
            color: var(--primary);
            transform: scale(1.02) rotate(-1deg);
        }
        .btn-solid {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
        }
        .btn-solid:hover {
            background: var(--secondary);
            border-color: var(--secondary);
            color: var(--primary);
        }
        .hero-visual svg {
            width: 100%;
            max-width: 400px;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(255,59,0,0.5));
        }

        /* ===== STATS / INFO BLOCK ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: var(--gap);
        }
        .stat-card {
            padding: 48px 32px;
            border: var(--border-w) solid var(--secondary);
            background: var(--primary);
            transform: rotate(0deg);
            transition: 0.2s;
            position: relative;
        }
        .stat-card:nth-child(odd) { transform: rotate(-1deg); }
        .stat-card:nth-child(even) { transform: rotate(1deg); }
        .stat-card:hover {
            border-color: var(--accent);
            transform: scale(1.02) rotate(0deg);
        }
        .stat-card .number {
            font-family: var(--font-impact);
            font-size: 3.6rem;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 12px;
        }
        .stat-card label {
            font-family: var(--font-sys);
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--secondary);
            display: block;
        }
        .stat-card .detail {
            font-family: var(--font-sys);
            font-size: 0.95rem;
            color: #aaa;
            margin-top: 8px;
        }

        /* ===== SECTION STYLES ===== */
        .section-title {
            display: inline-block;
            background: var(--primary);
            border: var(--border-w) solid var(--accent);
            padding: 16px 40px;
            margin-bottom: var(--gap);
            transform: skew(-6deg);
            font-size: clamp(2rem, 6vw, 3.6rem);
        }
        .section-title span { display: inline-block; transform: skew(6deg); }

        /* ===== REVIEW CARDS ===== */
        .review-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--gap);
        }
        .review-card {
            background: var(--primary);
            border: var(--border-w) solid var(--secondary);
            padding: 40px 32px;
            position: relative;
            transition: 0.2s;
        }
        .review-card::before {
            content: '"';
            position: absolute;
            top: 8px; left: 16px;
            font-family: var(--font-impact);
            font-size: 5rem;
            color: var(--accent);
            opacity: 0.3;
            line-height: 1;
        }
        .review-card:hover { border-color: var(--accent); }
        .review-card .stars {
            color: var(--accent);
            font-size: 1.6rem;
            letter-spacing: 4px;
            margin-bottom: 16px;
        }
        .review-card blockquote {
            font-family: var(--font-sys);
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 24px;
            padding-left: 12px;
            border-left: 4px solid var(--accent);
        }
        .review-card .author {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-sys);
            font-weight: 700;
            font-size: 0.95rem;
            color: #ccc;
            border-top: 2px solid #333;
            padding-top: 16px;
        }
        .review-card .author .date { color: #777; font-weight: 400; }

        /* ===== FRANCHISE VS INDIE ===== */
        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--gap);
        }
        .compare-col {
            padding: 48px 36px;
            border: var(--border-w) solid var(--secondary);
        }
        .compare-col:first-child { border-color: var(--accent); }
        .compare-col h3 { color: var(--accent); }
        .compare-col ul { margin-top: 24px; }
        .compare-col li {
            font-family: var(--font-sys);
            padding: 12px 0;
            border-bottom: 2px solid #222;

</body>
